<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Desvio Astral - Online</title>
  <style>
    :root {
      background: #080a19;
      color: #f5f5f5;
      color-scheme: dark;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin: 0;
      padding: 16px;
      min-height: 100vh;
    }

    canvas {
      box-shadow: 0 0 32px rgb(90 180 255 / 35%);
      border: 2px solid #5ab4ff;
      border-radius: 12px;
      background: radial-gradient(circle at top, #17224f 0%, #080a19 60%);
      max-width: 100%;
    }

    .hint {
      margin: 0;
      color: #b9d8ff;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>

<body>
  <canvas id="game" width="800" height="600" aria-label="Desvio Astral"></canvas>
  <p class="hint">Use &#x2190; / &#x2192; para mover. Pressione ENTER para iniciar ou reiniciar.</p>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const STATES = Object.freeze({ START_MENU: 'START_MENU', GAMEPLAY: 'GAMEPLAY', VICTORY: 'VICTORY', GAME_OVER: 'GAME_OVER' });

    const keys = new Set();

    const shipImg = new Image();
    shipImg.src = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADAAAAAwCAYAAABXAvmHAAAAAXNSR0IArs4c6QAAAYpJREFUaIHt1zFLw0AYBuC3Wh0y6dKpWIoIGRwka12ELuLQ/IBMdcpiAwFXcRUC1SVTO/kDzCCCOKarODgUpEigi05OGTQhDmlDUiME+12h+D1Tc5fcdy+5JFeAMcYYY4wxxpZUSdC40aLqiQgQnRkXuR3n3VPymtQBksm/vw4zHZW6DIA+BGWAzORtp5/p1FttISHKFIOkTSe/9WDCrPkAAMuTYDetTAgqVHcg0lttAIDt9LHdPcbJ0Tr2y6sAADcIcXX7iZHRQ/o8ivor8w6Q52t3o1AbBSEBFklIgLXnj0JtFEgDKJoKvdXGyOjB8iS4QQg3CGF5UrL+FU2lLEn/FgLiV6bdtNCZaRNBSABFU6HntD1e35DXEvoQK5pKvmRmUQSI/rI8Jtf8tukrTMgSGg+GqNRljAfxfij9mxppgOnEAaDakHP7qIOQBLg/KE2+tG8waz6kp8Mf51QbMvy9O1ieBGAz/i4489cm2wulDy5f9GQfNOUGITo7Nnn9pf9HxhhjjDH2n30Dm9N7drXW9b0AAAAASUVORK5CYII=';
    const meteorImg = new Image();
    meteorImg.src = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAGAAAABgCAYAAADimHc4AAAAAXNSR0IArs4c6QAABAFJREFUeJztmj1LK1EQht9cLqQVUmyZIGFLbRK2S5l/IKQWbMSfE24jWAf8B5Z2wTRahiBJmUKwTbW32Mw6Ozmbjd6P2eD7gKBnP9yd98zHmbMAIYQQQgghhBBCCCGEEEIIIYQQQgghhBBCCCGEEEKOnYb3A1SQVhyv+/NX4vYClxdXpcfu7m9TAPh1cwMAmK03AIDFcpWfM0piXI/H9tKjE+Sn9wNoxPCD/hDdTjsf70XN7W/ZmAghAgnX43GKIxPhh/cDCHf3t+nZ6TkG/WE+JjNfECFGSVwYn0znmEznIkhV2KoVrh4gM/nx6SE9Oz3HSSsqzHxgVwTLbL1Bt9MueMUxeYK7B4jxQyyWq0LcF2brTS6MeEW308ZkOgeAo/IEVwG08U9aEYAPr+hFzdwbtBAf+QCHilBrIdzcdNAf7gggBheDllU/ghXAMltvsFiu8Pj0IEO1C0ueD5RKwn1/W+ceIAa2sd+GIn1emQByXOUaGa6NEK5JeJTEmYEOPF8n28l0jlES58aX0CP3tddlZII/Pj3UJkm7J2EAhconFFb07LdVkh6XY1oMfZ9up41REtcqSXsJkA76Q0ym80ICFawIoyQuzOp9pWpIoF7UzH+Euojg5YapXnCNkrgwa20yBsoXZfb4YrnKxdL3lP9jz7+7vwUcw1EtBAgRakVoEfYlXiAzvi5jBSuCtwCuOcCGFo2u/XVI0qFk3ypZC1iWN3pR0z0UuVVBuowMzdRDWhK2AtJi9qLmTm6wpawNUR64ekDZDLYrYGs47QU61IhBrceUIddtw6GLF7gKsM84vaiJURIH2xGhqmefx4gQoSRcFp7+F24CyGy1IohB9CzWNX4oL1h0jqjqpnrjXgXpkvGQXCDHQqUqsNuaqKqcvCshdwEEbdCqWVslAlCeX0Lnbrc2XWxRi1aExbYhysKUDkdicBt2bCK3xz2ND/gJ0FCdyQI6tutQVLXw0tcC4c0c/Xdd8oNrO1q2IYV9FYkWQBK49oSv5A/g+7YigK0AAPaKoI1bllzlnH29I3tPINsfuLy4amxFcMFtJTzoDxuyI/b+ts7HZW8gtHINGdWGFQDBdkUxhO3e2wvXJDzoDxsvr88AMi/QnhAKFxZtxLJEK2LIpyuCzP6/9zZfw3VPWNCfpVQREuTQ2Sye9vL6XDD+twxBGglHg1a4Ra33jD9rbMvL6zMG/WFD5xZP3ATYfflMBCDzjjIDhtACCfK3vo8Y/4uP/E+ohQcAIkhmHBFCf7AVMnKVSDrkAKid8YEafBmgv5K24UWEAIpiVHHSivQnKEHDB9YCLrgL8Ak+268/pncjhBBCCCGEEEIIIYQQQgghhBBCCCGEEEIIIYQQQv6E3xBmThpdw0e+AAAAAElFTkSuQmCC';
    let assetsLoaded = 0;
    shipImg.onload = () => assetsLoaded++;
    meteorImg.onload = () => assetsLoaded++;

    let state = STATES.START_MENU, lastTime = performance.now();
    let elapsedTime = 0, score = 0, finalScore = 0, spawnTimer = 0, meteors = [];

    const ship = { width: 64, height: 64, x: W / 2 - 32, y: H - 96, speed: 420 };

    const cfg = Object.freeze({
      baseMeteorSpeed: 180, baseSpawnInterval: 0.9, minSpawnInterval: 0.18,
      difficultyInterval: 10, meteorSpeedIncrement: 35, spawnIntervalDecrement: 0.07,
      winSurvivalSeconds: 120, winScore: 10000, pointsPerSecond: 85,
    });

    window.addEventListener('keydown', e => {
      keys.add(e.key);
      if (e.key === 'Enter' && state !== STATES.GAMEPLAY) startGame();
    });
    window.addEventListener('keyup', e => keys.delete(e.key));

    function startGame() {
      state = STATES.GAMEPLAY; elapsedTime = 0; score = 0; finalScore = 0;
      spawnTimer = 0; meteors = [];
      ship.x = W / 2 - ship.width / 2; ship.y = H - 96;
      lastTime = performance.now();
    }

    const diffLevel = () => Math.floor(elapsedTime / cfg.difficultyInterval);
    const spawnInterval = () => Math.max(cfg.minSpawnInterval, cfg.baseSpawnInterval - diffLevel() * cfg.spawnIntervalDecrement);
    const meteorSpeed = () => cfg.baseMeteorSpeed + diffLevel() * cfg.meteorSpeedIncrement;

    function spawnMeteor() {
      const size = 48 + Math.random() * 40;
      meteors.push({
        x: Math.random() * (W - size), y: -size, size, speed: meteorSpeed(),
        rotation: Math.random() * Math.PI * 2, rotSpeed: (Math.random() - 0.5) * 1.5
      });
    }

    function collides(s, m) {
      const sh = 0.8;
      const sx = s.x + s.width * (1 - sh) / 2, sy = s.y + s.height * (1 - sh) / 2;
      const sw = s.width * sh, sH = s.height * sh;
      const mx = m.x + m.size * (1 - sh) / 2, my = m.y + m.size * (1 - sh) / 2, ms = m.size * sh;
      return sx < mx + ms && sx + sw > mx && sy < my + ms && sy + sH > my;
    }

    function update(dt) {
      if (state !== STATES.GAMEPLAY) return;
      elapsedTime += dt; score = Math.floor(elapsedTime * cfg.pointsPerSecond);
      if (keys.has('ArrowLeft')) ship.x -= ship.speed * dt;
      if (keys.has('ArrowRight')) ship.x += ship.speed * dt;
      ship.x = Math.max(0, Math.min(W - ship.width, ship.x));
      spawnTimer += dt;
      if (spawnTimer >= spawnInterval()) { spawnMeteor(); spawnTimer = 0; }
      meteors.forEach(m => { m.y += m.speed * dt; m.rotation += m.rotSpeed * dt; });
      meteors = meteors.filter(m => m.y <= H + m.size);
      if (meteors.some(m => collides(ship, m))) { finalScore = score; state = STATES.GAME_OVER; }
      if (elapsedTime >= cfg.winSurvivalSeconds || score >= cfg.winScore) { finalScore = score; state = STATES.VICTORY; }
    }

    function drawBg() {
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#080a19'; ctx.fillRect(0, 0, W, H);
      for (let i = 0; i < 80; i++) {
        ctx.globalAlpha = 0.25 + (i % 5) * 0.1;
        ctx.fillStyle = '#ffffff';
        ctx.fillRect((i * 97) % W, (i * 53) % H, 2, 2);
      }
      ctx.globalAlpha = 1;
    }

    function centerText(text, size, color, y) {
      ctx.fillStyle = color; ctx.font = size + 'px Arial'; ctx.textAlign = 'center';
      ctx.fillText(text, W / 2, y);
    }

    function draw() {
      drawBg();
      if (assetsLoaded < 2) { centerText('Carregando...', 32, '#5ab4ff', H / 2); return; }
      if (state === STATES.START_MENU) {
        centerText('Desvio Astral', 72, '#ffdc5a', 130);
        centerText('2D Avoidance / Survival', 30, '#f5f5f5', 205);
        centerText('\u2190 / \u2192 Arrow Keys - Move', 30, '#5ab4ff', 290);
        centerText('ENTER - Start Game', 30, '#5ab4ff', 330);
        centerText('Survive 120s or reach 10,000 points', 24, '#f5f5f5', 405);
      } else if (state === STATES.GAMEPLAY) {
        ctx.drawImage(shipImg, ship.x, ship.y, ship.width, ship.height);
        meteors.forEach(m => {
          ctx.save();
          ctx.translate(m.x + m.size / 2, m.y + m.size / 2);
          ctx.rotate(m.rotation);
          ctx.drawImage(meteorImg, -m.size / 2, -m.size / 2, m.size, m.size);
          ctx.restore();
        });
        ctx.fillStyle = '#f5f5f5'; ctx.font = '28px Arial'; ctx.textAlign = 'left';
        ctx.fillText('Score: ' + score, 20, 38);
        ctx.fillText('Time: ' + Math.floor(elapsedTime) + 's', 20, 72);
      } else if (state === STATES.VICTORY) {
        centerText('Mission Complete!', 52, '#78ffa0', 180);
        centerText('Final Score: ' + finalScore, 32, '#f5f5f5', 265);
        centerText('Press ENTER to Play Again', 32, '#5ab4ff', 340);
      } else if (state === STATES.GAME_OVER) {
        centerText('Game Over', 52, '#ff5a5a', 180);
        centerText('Final Score: ' + finalScore, 32, '#f5f5f5', 265);
        centerText('Press ENTER to Retry', 32, '#5ab4ff', 340);
      }
    }

    function loop(t) {
      const dt = Math.min((t - lastTime) / 1000, 0.05);
      lastTime = t; update(dt); draw(); requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
</body>

</html>
